name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: cljc inference
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: inference
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/num
          path: num
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/torch
          path: torch
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest
      - name: clojure tests
        working-directory: inference
        run: clojure -M:test
      - name: Lint
        working-directory: inference
        run: clojure -M:lint
      - name: babashka smoke
        working-directory: inference
        run: bb test:cljc
      - name: ensure Rust files stay out
        working-directory: inference
        run: |
          if find . \
            \( -name Cargo.toml -o -name Cargo.lock -o -name '*.rs' -o -name 'rust-toolchain*' -o -path './.cargo/*' \) \
            -print -quit | grep -q .; then
            find . \( -name Cargo.toml -o -name Cargo.lock -o -name '*.rs' -o -name 'rust-toolchain*' -o -path './.cargo/*' \) -print
            exit 1
          fi

  native-kdot:
    name: native ggml K-dot parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - name: Build native K-dot
        run: scripts/build-native-kdot.sh
      - name: Verify official ggml parity
        run: clojure -M:verify-native-kdot

  metal-kdot:
    name: Apple Metal K-dot parity
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Verify Metal shader oracle and projection benchmark
        run: deno run --unstable-webgpu --allow-read verify/metal_kdot.js
      - name: Verify persistent JVM Metal worker
        run: clojure -M:verify-metal-kdot-worker
